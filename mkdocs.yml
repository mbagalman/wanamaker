site_name: Wanamaker
site_description: Open-source Bayesian marketing mix modeling for trustable usability.
site_url: https://wanamaker.dev
repo_url: https://github.com/mbagalman/wanamaker
repo_name: mbagalman/wanamaker

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            filters:
              - "!^_"
            heading_level: 3
            members_order: source
            show_if_no_docstring: false
            show_root_full_path: false
            show_root_heading: true
            show_source: false

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Analyst's Guide: analyst_guide.md
  - What Wanamaker Tells Your CMO: cmo_guide.md
  - Privacy and Data Handling: privacy.md
  - Comparison to Other Tools: comparison.md
  - API Reference: api_reference.md
  - Architecture:
      - Technical Architecture: architecture.md
      - BRD/PRD: wanamaker_brd_prd.md
      - Feedback: feedback.md
      - Risk-Adjusted Allocation Ramps: risk_adjusted_allocation.md
  - Decisions:
      - Bayesian Engine Selection: decisions/0001-bayesian-engine-selection.md
  - References:
      - Adstock and Saturation: references/adstock_and_saturation.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

