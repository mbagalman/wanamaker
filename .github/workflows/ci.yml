name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # -----------------------------------------------------------------------
  # Fast unit tests — no engine required, runs on every push/PR
  # -----------------------------------------------------------------------
  unit:
    name: Unit tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run unit tests (no engine)
        run: pytest tests/unit/ -m "not engine" -ra --tb=short

      - name: Network guardrail
        run: pytest tests/test_no_network_in_core.py -ra --tb=short

  # -----------------------------------------------------------------------
  # Reproducibility test — requires PyMC, runs on push to master only
  # Satisfies NFR-2 / issue #11: same seed → numerically identical results
  # -----------------------------------------------------------------------
  reproducibility:
    name: Reproducibility (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps (includes PyMC)
        run: pip install -e ".[dev]"

      - name: Run reproducibility test
        env:
          WANAMAKER_RUN_ENGINE_TESTS: "1"
        run: pytest tests/test_reproducibility.py -ra --tb=short -v
